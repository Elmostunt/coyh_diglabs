steps:
  # Paso 1: instalar dependencias (puppeteer descarga su propio Chromium ~170MB)
  - name: 'node:22'
    entrypoint: npm
    args: ['install']

  # Paso 2: build React
  - name: 'node:22'
    entrypoint: npm
    args: ['run', 'build']
    env:
      - 'REACT_APP_EMAILJS_SERVICE_ID=service_n63g82y'
      - 'REACT_APP_EMAILJS_TEMPLATE_ID=template_pnabaae'
      - 'REACT_APP_EMAILJS_PUBLIC_KEY=wz2btEynCC939gKaJ'

  # Paso 3: pre-renderizar 7 rutas con react-snap
  - name: 'node:22'
    entrypoint: npm
    args: ['run', 'prerender']

  # Paso 4: deploy a App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - app
      - deploy
      - app.yaml
      - --project=memos-tablet
      - --quiet
    timeout: '600s'

logsBucket: 'gs://logs-sdlabs'
timeout: "1200s"
